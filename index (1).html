<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무용어 트레이너 | 마이홈택스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --gold: #c8a84b;
    --gold-light: #e8c96e;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(200,168,75,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,168,75,0.12);
    border: 1px solid rgba(200,168,75,0.3);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  h1 em { font-style: normal; color: var(--gold); }
  .divider {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 14px auto;
  }
  .subtitle { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 300; }

  /* Card */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 18px;
  }
  .input-label {
    font-size: 10px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 10px; display: block;
  }
  .input-row { display: flex; gap: 10px; }
  textarea {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    resize: none; height: 70px; outline: none; line-height: 1.6;
  }
  textarea::placeholder { color: rgba(255,255,255,0.3); }
  textarea:focus { border-color: rgba(200,168,75,0.5); }
  .ask-btn {
    background: linear-gradient(135deg, var(--gold) 0%, #a07830 100%);
    color: #0f1f3d;
    border: none; border-radius: 10px;
    padding: 0 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; min-width: 68px; line-height: 1.4;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .ask-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(200,168,75,0.3);
  }
  .ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.55);
    border-radius: 100px; padding: 4px 12px;
    font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .tag:hover {
    background: rgba(200,168,75,0.15);
    border-color: rgba(200,168,75,0.4);
    color: var(--gold-light);
  }

  /* Loading */
  .loading-wrap { text-align: center; padding: 30px; }
  .spinner {
    width: 30px; height: 30px;
    border: 2px solid rgba(200,168,75,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: rgba(255,255,255,0.35); }

  /* Result */
  .term-pill {
    display: inline-block;
    background: var(--gold); color: #0f1f3d;
    font-weight: 700; font-size: 12px;
    padding: 3px 12px; border-radius: 100px;
    margin-bottom: 18px;
  }
  .sec-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 7px;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(200,168,75,0.18);
  }
  .sec-text {
    font-size: 14px; line-height: 1.85;
    color: rgba(255,255,255,0.85);
    font-weight: 300; margin-bottom: 18px;
  }
  .example {
    background: rgba(200,168,75,0.07);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px; line-height: 1.8;
    color: rgba(255,255,255,0.72);
    margin-bottom: 18px;
  }
  .points { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .points li {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 13px; line-height: 1.7;
    color: rgba(255,255,255,0.75);
  }
  .points li::before {
    content: '▸'; color: var(--gold);
    font-size: 10px; margin-top: 3px; flex-shrink: 0;
  }

  /* Error */
  .error-msg { color: rgba(255,120,120,0.85); font-size: 13px; padding: 4px 0; }

  /* History */
  .hist-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .hist-title::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.05);
  }
  .hist-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .hist-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.4);
    border-radius: 7px; padding: 4px 12px;
    font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .hist-item:hover { background: rgba(200,168,75,0.1); color: var(--gold-light); }

  /* Empty */
  .empty { text-align: center; padding: 30px; color: rgba(255,255,255,0.2); font-size: 13px; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.35; }

  /* Footer */
  footer {
    text-align: center; margin-top: 48px;
    font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
  }

  @media (max-width: 560px) {
    .input-row { flex-direction: column; }
    .ask-btn { height: 44px; width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-badge">📋 마이홈택스 세무회계사무소</div>
    <h1>세무용어 <em>AI 트레이너</em></h1>
    <div class="divider"></div>
    <p class="subtitle">어려운 세무용어, 고객에게 쉽게 설명하는 법을 배웁니다</p>
  </header>

  <div class="card">
    <label class="input-label">용어 또는 질문 입력</label>
    <div class="input-row">
      <textarea id="inp" placeholder="예: 손금불산입이 뭔가요? / 원천징수 고객에게 어떻게 말하지?"></textarea>
      <button class="ask-btn" id="askBtn" onclick="ask()">설명<br>받기</button>
    </div>
    <div class="tags" id="tagArea"></div>
  </div>

  <div id="resultArea">
    <div class="empty"><div class="empty-icon">💡</div>태그를 클릭하거나 용어를 직접 입력해보세요</div>
  </div>

  <div id="histArea"></div>

  <footer>내부 직원 교육 전용 | 마이홈택스 세무회계사무소</footer>
</div>

<script>
const TAGS = ["손금불산입","원천징수","부가가치세","세무조정","가산세","이월결손금","실질과세원칙","접대비 한도","종합소득세","법인세 세율","감가상각","세액공제"];
const SYS = `당신은 마이홈택스 세무회계사무소의 직원 교육 AI입니다. 직원들이 고객에게 세무용어를 쉽게 설명할 수 있도록 도와주세요.\n반드시 순수 JSON만 반환하세요. 마크다운, 코드블록, 설명 텍스트 일절 없이 JSON만:\n{"term":"정확한 용어명","simple":"초등학생도 이해할 수 있는 한 문장 핵심 설명 (비유 활용)","detail":"일반인 고객에게 설명하는 2~3문장 설명. 전문용어 최소화.","example":"실제 고객 상황을 가정한 구체적 예시 (금액, 상황 포함)","points":["핵심 포인트 1","핵심 포인트 2","핵심 포인트 3"]}\n모든 내용 한국어.`;

let history = [];

// 태그 렌더
const tagArea = document.getElementById("tagArea");
TAGS.forEach(t => {
  const b = document.createElement("button");
  b.className = "tag"; b.textContent = t;
  b.onclick = () => { document.getElementById("inp").value = t; ask(); };
  tagArea.appendChild(b);
});

// Enter 지원
document.getElementById("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
});

async function ask() {
  const q = document.getElementById("inp").value.trim();
  if (!q) return;
  const btn = document.getElementById("askBtn");
  const res = document.getElementById("resultArea");
  btn.disabled = true;
  res.innerHTML = `<div class="card loading-wrap"><div class="spinner"></div><div class="loading-text">AI가 설명을 준비하고 있어요...</div></div>`;

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYS,
        messages: [{ role: "user", content: q }]
      })
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const raw = (d.content || []).map(b => b.text || "").join("");
    const cleaned = raw.replace(/```[\w]*\n?/g, "").replace(/```/g, "").trim();
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (!m) throw new Error("응답 형식 오류");
    const p = JSON.parse(m[0]);
    render(p);
    addHist(p.term || q);
  } catch(e) {
    res.innerHTML = `<div class="card"><div class="error-msg">⚠️ 오류: ${e.message}</div></div>`;
  } finally {
    btn.disabled = false;
  }
}

function render(d) {
  const pts = (d.points || []).map(p => `<li>${p}</li>`).join("");
  document.getElementById("resultArea").innerHTML = `
    <div class="card">
      <div class="term-pill">${d.term || ""}</div>
      <div class="sec-label">한 줄 핵심</div>
      <div class="sec-text">${d.simple || ""}</div>
      <div class="sec-label">고객 설명용</div>
      <div class="sec-text">${d.detail || ""}</div>
      <div class="sec-label">실제 예시</div>
      <div class="example">${d.example || ""}</div>
      ${pts ? `<div class="sec-label">핵심 포인트</div><ul class="points">${pts}</ul>` : ""}
    </div>`;
}

function addHist(t) {
  history = [t, ...history.filter(h => h !== t)].slice(0, 8);
  document.getElementById("histArea").innerHTML = `
    <div class="hist-title">최근 검색</div>
    <div class="hist-list">${history.map(h =>
      `<button class="hist-item" onclick="document.getElementById('inp').value='${h}';ask()">${h}</button>`
    ).join("")}</div>`;
}
</script>
</body>
</html>
